name: code style

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint:
    runs-on: ubuntu-22.04

    # Skip draft pull requests; push and ready_for_review still cover them.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    name: Pint

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer install --no-interaction --no-progress

      # `--test` reports violations without rewriting files, so CI fails on
      # unformatted code rather than silently fixing it.
      - name: Check code style
        run: vendor/bin/pint --test --ansi
