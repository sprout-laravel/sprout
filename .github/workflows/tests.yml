name: tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-22.04

    # Skip draft pull requests; push, cron and ready_for_review still cover them.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    name: Tests (PHP ${{ matrix.php }})

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4', '8.5' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, gd, redis, igbinary, msgpack, lzf, zstd, lz4, memcached, gmp, :php-psr
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: pcov

      - name: Install dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 5
          # `update` (not `install`) so each PHP leg resolves dependencies for
          # that version, testing the composer.json version ranges rather than
          # the single pinned set in composer.lock.
          command: composer update --no-interaction --no-progress

      - name: Execute tests
        run: composer test

      - name: Upload coverage reports to Codecov
        if: matrix.php == '8.3'
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true # optional (default = false)
          files: ./build/logs/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() && matrix.php == '8.3' }}
        uses: codecov/test-results-action@v1
        with:
          files: ./build/report.junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
